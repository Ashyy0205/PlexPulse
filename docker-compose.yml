services:
  plexpulse:
    build: .
    container_name: plexpulse
    restart: unless-stopped
    ports:
      - "6262:6262"
    volumes:
      - ./data:/data
      - /mnt:/mnt:ro
    environment:
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - COLLECTION_INTERVAL=${COLLECTION_INTERVAL:-6h}
      - TZ=${TZ:-UTC}
      - MONITOR_PATH_MOVIES=${MONITOR_PATH_MOVIES:-/mnt/user/Movies}
      - MONITOR_PATH_TV=${MONITOR_PATH_TV:-/mnt/user/TV Shows}
      - MONITOR_PATH_MUSIC=${MONITOR_PATH_MUSIC:-/mnt/user/Music}
